databases:
  - name: pohjanmaan-viherrakennus-db
    plan: free
    databaseName: pmvr
    user: pmvr

services:
  - type: web
    name: pohjanmaan-viherrakennus
    runtime: node
    nodeVersion: "22"
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma db push && npx tsx prisma/seed.ts && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pohjanmaan-viherrakennus-db
          property: connectionString
      - key: NODE_ENV
        value: production
