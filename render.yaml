services:
  - type: web
    name: pohjanmaan-viherrakennus
    runtime: node
    nodeVersion: "22"
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma db push && npx tsx prisma/seed.ts && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
